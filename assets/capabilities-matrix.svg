<svg viewBox="0 0 1400 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="matrixBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07090f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <filter id="matrixShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1400" height="750" fill="url(#matrixBg)"/>

  <!-- Title -->
  <text x="700" y="50" font-size="44" font-weight="900" fill="#00d9ff" text-anchor="middle" font-family="Arial, sans-serif">
    Capabilities & Performance Matrix
  </text>
  <text x="700" y="90" font-size="16" fill="#7fa0c0" text-anchor="middle" font-family="Arial">System metrics, features, and validation status</text>

  <!-- Section 1: Autonomous Driving Capabilities -->
  <g filter="url(#matrixShadow)">
    <rect x="50" y="120" width="1300" height="280" rx="15" fill="#1e3a5f" stroke="#00d9ff" stroke-width="2"/>

    <text x="70" y="155" font-size="18" font-weight="bold" fill="#00d9ff" font-family="Arial">AUTONOMOUS DRIVING CAPABILITIES</text>

    <!-- Capability rows -->
    <g>
      <!-- Lane Following -->
      <rect x="70" y="175" width="350" height="45" rx="8" fill="#2a3f5f"/>
      <text x="85" y="205" font-size="13" font-weight="bold" fill="#00d9ff" font-family="Arial">Lane Following</text>
      <rect x="430" y="175" width="850" height="45" rx="8" fill="#2a3f5f" stroke="#00ff88" stroke-width="2"/>
      <circle cx="450" cy="197" r="6" fill="#00ff88"/>
      <text x="470" y="205" font-size="12" fill="#a0d9ff" font-family="Arial">Regulated Pure Pursuit | Adaptive Lookahead (2-5m) | Multi-lane Support | Speed: 0-8 m/s ✓ Validated</text>

      <!-- Obstacle Avoidance -->
      <rect x="70" y="230" width="350" height="45" rx="8" fill="#2a3f5f"/>
      <text x="85" y="260" font-size="13" font-weight="bold" fill="#00d9ff" font-family="Arial">Obstacle Avoidance</text>
      <rect x="430" y="230" width="850" height="45" rx="8" fill="#2a3f5f" stroke="#00ff88" stroke-width="2"/>
      <circle cx="450" cy="252" r="6" fill="#00ff88"/>
      <text x="470" y="260" font-size="12" fill="#a0d9ff" font-family="Arial">Lidar-based Detection | 2D Costmap | Emergency Brake | 100% Safety Margin ✓ Validated</text>

      <!-- Traffic Light Recognition -->
      <rect x="70" y="285" width="350" height="45" rx="8" fill="#2a3f5f"/>
      <text x="85" y="315" font-size="13" font-weight="bold" fill="#00d9ff" font-family="Arial">Traffic Light Enforcement</text>
      <rect x="430" y="285" width="850" height="45" rx="8" fill="#2a3f5f" stroke="#00ff88" stroke-width="2"/>
      <circle cx="450" cy="307" r="6" fill="#00ff88"/>
      <text x="470" y="315" font-size="12" fill="#a0d9ff" font-family="Arial">CARLA Integration | Automatic Stop/Go | Rule Compliance | Human-safe Behavior ✓ Validated</text>

      <!-- Sensor Fusion -->
      <rect x="70" y="340" width="350" height="45" rx="8" fill="#2a3f5f"/>
      <text x="85" y="370" font-size="13" font-weight="bold" fill="#00d9ff" font-family="Arial">Multi-Sensor Fusion</text>
      <rect x="430" y="340" width="850" height="45" rx="8" fill="#2a3f5f" stroke="#00ff88" stroke-width="2"/>
      <circle cx="450" cy="362" r="6" fill="#00ff88"/>
      <text x="470" y="370" font-size="12" fill="#a0d9ff" font-family="Arial">3x RGB Cameras (1280×720@30Hz) | 64-Ray Lidar (20Hz) | IMU + GNSS | Time-synced ✓ Validated</text>
    </g>
  </g>

  <!-- Section 2: Performance Metrics -->
  <g filter="url(#matrixShadow)">
    <rect x="50" y="425" width="630" height="280" rx="15" fill="#1e3a5f" stroke="#ffd700" stroke-width="2"/>

    <text x="70" y="460" font-size="18" font-weight="bold" fill="#ffd700" font-family="Arial">PERFORMANCE METRICS</text>

    <!-- Metrics table -->
    <g>
      <!-- Header -->
      <rect x="70" y="480" width="590" height="35" rx="8" fill="#2a3f5f" stroke="#ffd700" stroke-width="1"/>
      <text x="100" y="507" font-size="12" font-weight="bold" fill="#ffd700" font-family="Arial">Metric</text>
      <text x="280" y="507" font-size="12" font-weight="bold" fill="#ffd700" font-family="Arial">Value</text>
      <text x="480" y="507" font-size="12" font-weight="bold" fill="#ffd700" font-family="Arial">Status</text>

      <!-- Row 1: Control Loop -->
      <rect x="70" y="520" width="590" height="30" rx="5" fill="#2a3f5f"/>
      <text x="100" y="542" font-size="11" fill="#a0d9ff" font-family="Arial">Control Loop Frequency</text>
      <text x="280" y="542" font-size="11" fill="#a0d9ff" font-family="Arial">20 Hz</text>
      <circle cx="495" cy="535" r="5" fill="#00ff88"/>
      <text x="510" y="542" font-size="11" fill="#00ff88" font-family="Arial">✓ Stable</text>

      <!-- Row 2: Latency -->
      <rect x="70" y="555" width="590" height="30" rx="5" fill="#2a3f5f"/>
      <text x="100" y="577" font-size="11" fill="#a0d9ff" font-family="Arial">End-to-End Latency</text>
      <text x="280" y="577" font-size="11" fill="#a0d9ff" font-family="Arial">40-50 ms</text>
      <circle cx="495" cy="570" r="5" fill="#00ff88"/>
      <text x="510" y="577" font-size="11" fill="#00ff88" font-family="Arial">✓ Real-time</text>

      <!-- Row 3: CPU Usage -->
      <rect x="70" y="590" width="590" height="30" rx="5" fill="#2a3f5f"/>
      <text x="100" y="612" font-size="11" fill="#a0d9ff" font-family="Arial">CPU Utilization</text>
      <text x="280" y="612" font-size="11" fill="#a0d9ff" font-family="Arial">30-40%</text>
      <circle cx="495" cy="605" r="5" fill="#00ff88"/>
      <text x="510" y="612" font-size="11" fill="#00ff88" font-family="Arial">✓ Efficient</text>

      <!-- Row 4: Memory -->
      <rect x="70" y="625" width="590" height="30" rx="5" fill="#2a3f5f"/>
      <text x="100" y="647" font-size="11" fill="#a0d9ff" font-family="Arial">Memory Footprint</text>
      <text x="280" y="647" font-size="11" fill="#a0d9ff" font-family="Arial">2.5 GB RAM</text>
      <circle cx="495" cy="640" r="5" fill="#00ff88"/>
      <text x="510" y="647" font-size="11" fill="#00ff88" font-family="Arial">✓ Low</text>

      <!-- Row 5: Max Speed -->
      <rect x="70" y="660" width="590" height="30" rx="5" fill="#2a3f5f"/>
      <text x="100" y="682" font-size="11" fill="#a0d9ff" font-family="Arial">Maximum Speed</text>
      <text x="280" y="682" font-size="11" fill="#a0d9ff" font-family="Arial">8 m/s (28.8 km/h)</text>
      <circle cx="495" cy="675" r="5" fill="#00ff88"/>
      <text x="510" y="682" font-size="11" fill="#00ff88" font-family="Arial">✓ Safe</text>
    </g>
  </g>

  <!-- Section 3: Environment Support -->
  <g filter="url(#matrixShadow)">
    <rect x="710" y="425" width="630" height="280" rx="15" fill="#1e3a5f" stroke="#ff6b9d" stroke-width="2"/>

    <text x="730" y="460" font-size="18" font-weight="bold" fill="#ff6b9d" font-family="Arial">ENVIRONMENT SUPPORT</text>

    <!-- Environment table -->
    <g>
      <!-- Header -->
      <rect x="730" y="480" width="570" height="35" rx="8" fill="#2a3f5f" stroke="#ff6b9d" stroke-width="1"/>
      <text x="760" y="507" font-size="12" font-weight="bold" fill="#ff6b9d" font-family="Arial">Environment</text>
      <text x="1080" y="507" font-size="12" font-weight="bold" fill="#ff6b9d" font-family="Arial">Support</text>

      <!-- Row 1: CARLA Towns -->
      <rect x="730" y="520" width="570" height="30" rx="5" fill="#2a3f5f"/>
      <text x="760" y="542" font-size="11" fill="#a0d9ff" font-family="Arial">CARLA Towns</text>
      <text x="1080" y="542" font-size="11" fill="#a0d9ff" font-family="Arial">Town01-Town10 ✓ All Tested</text>

      <!-- Row 2: Weather -->
      <rect x="730" y="555" width="570" height="30" rx="5" fill="#2a3f5f"/>
      <text x="760" y="577" font-size="11" fill="#a0d9ff" font-family="Arial">Weather Conditions</text>
      <text x="1080" y="577" font-size="11" fill="#a0d9ff" font-family="Arial">Clear, Rain, Fog, Sunset ✓</text>

      <!-- Row 3: Traffic -->
      <rect x="730" y="590" width="570" height="30" rx="5" fill="#2a3f5f"/>
      <text x="760" y="612" font-size="11" fill="#a0d9ff" font-family="Arial">Traffic Scenarios</text>
      <text x="1080" y="612" font-size="11" fill="#a0d9ff" font-family="Arial">Light, Medium, Heavy ✓</text>

      <!-- Row 4: Pedestrians -->
      <rect x="730" y="625" width="570" height="30" rx="5" fill="#2a3f5f"/>
      <text x="760" y="647" font-size="11" fill="#a0d9ff" font-family="Arial">Pedestrian Detection</text>
      <text x="1080" y="647" font-size="11" fill="#a0d9ff" font-family="Arial">Cross streets, Sidewalks ✓</text>

      <!-- Row 5: Edge Cases -->
      <rect x="730" y="660" width="570" height="30" rx="5" fill="#2a3f5f"/>
      <text x="760" y="682" font-size="11" fill="#a0d9ff" font-family="Arial">Edge Case Handling</text>
      <text x="1080" y="682" font-size="11" fill="#a0d9ff" font-family="Arial">Occlusion, Shadows ✓</text>
    </g>
  </g>

  <!-- Footer stats -->
  <g>
    <rect x="50" y="720" width="1300" height="0.5" fill="#00d9ff" opacity="0.4"/>
    <text x="200" y="745" font-size="11" fill="#7fa0c0" font-family="Arial">✓ Production Ready</text>
    <text x="500" y="745" font-size="11" fill="#7fa0c0" font-family="Arial">✓ Fully Validated</text>
    <text x="800" y="745" font-size="11" fill="#7fa0c0" font-family="Arial">✓ Sim-to-Real Transfer</text>
    <text x="1100" y="745" font-size="11" fill="#7fa0c0" font-family="Arial">✓ Hardware Agnostic</text>
  </g>
</svg>